bin.name = "diagrustic"
args = ["multiple-files"]
stdout = ""
stderr = """
error: called function has incompatible return type
 --> main.rs:2:13
  |
2 | fn main() { helper::run(); }
  |             ^^^^^^^^^^^ called here
  |
note: defined in another file
 --> helper.rs:1:8
  |
1 | pub fn run() -> bool { true }
  |        ---
  |

"""

[env]
add = { DIAGRUSTIC_COLOR = "never" }
